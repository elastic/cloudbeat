name: 'CDR Integrations Installation'
description: 'Deploy CDR Integrations to Elastic Cloud'
inputs:
  deployment-name:
    description: |
      Name with letters, numbers, hyphens; start with a letter. Max 20 chars. e.g., 'my-env-123'
    required: true
    type: string
  env-s3-bucket:
    description: "S3 bucket"
    required: true
    type: string
  aws-region:
    description: "AWS region"
    default: "eu-west-1"
    required: false
    type: string
  gcp-project-id:
    description: "GCP project ID"
    default: "default"
    required: false
    type: string
  gcp-service-account-json:
    description: "GCP Service Account JSON"
    default: "default"
    required: false
    type: string
  gcp-zone:
    description: "GCP zone for Asset Inventory agent deployment"
    required: false
    default: "us-central1-a"
    type: string
  aws-cloudtrail-s3-bucket:
    description: "AWS Cloudtrail S3 bucket"
    default: "default"
    required: false
    type: string
  azure-eventhub-connection-string:
    description: "Azure EventHub connection string"
    default: "default"
    required: false
    type: string
  azure-storage-account-key:
    description: "Azure Storage Account key"
    default: "default"
    required: false
    type: string
  wiz-client-id:
    description: "Wiz client ID"
    default: "default"
    required: false
    type: string
  wiz-client-secret:
    description: "Wiz client secret"
    default: "default"
    required: false
    type: string
  wiz-endpoint-url:
    description: "Wiz endpoint URL"
    default: "default"
    required: false
    type: string
  wiz-token-url:
    description: "Wiz token URL"
    default: "default"
    required: false
    type: string
  okta-logs-url:
    description: "Okta System Log API URL (e.g. https://dev-xxx.okta.com/api/v1/logs); empty skips Okta"
    default: "default"
    required: false
    type: string
  okta-api-key:
    description: "Okta API token for System Log"
    default: "default"
    required: false
    type: string
  okta-entity-analytics-domain:
    description: "Okta org hostname for Entity Analytics (e.g. dev-123456.okta.com); empty skips that integration"
    default: "default"
    required: false
    type: string
  es-user:
    description: "Elasticsearch user"
    default: "elastic"
    required: false
    type: string
  es-password:
    description: "Elasticsearch password"
    default: "changeme"
    required: false
    type: string
  elk-stack-version:
    description: "ELK Stack version"
    default: "8.16.0"
    required: false
    type: string
  kibana-url:
    description: "Kibana URL"
    default: "default"
    required: false
    type: string
  azure-tags:
    description: "Azure default tags"
    default: "Key=division,Value=engineering"
    required: false
    type: string
  tag-project:
    description: "Optional project resource tag"
    default: "test-environments"
    required: false
    type: string
  tag-owner:
    description: "Optional owner tag"
    default: "cloudbeat"
    required: false
    type: string
  enable-entity-store-v2:
    description: "When true, run Entity Store v2 installer; when false, run Entity Store v1 only"
    default: true
    required: false
    type: boolean
  serverless-mode:
    description: "When true, skip the Fleet status check (serverless deployments manage Fleet internally)"
    default: false
    required: false
    type: boolean

runs:
  using: composite
  steps:
    - name: Deploy CDR Infrastructure
      id: deploy-cdr-infra
      env:
        TF_VAR_deployment_name: ${{ inputs.deployment-name }}
        TF_VAR_region: ${{ inputs.aws-region }}
        TF_VAR_gcp_project_id: ${{ inputs.gcp-project-id }}
        TF_VAR_gcp_service_account_json: ${{ inputs.gcp-service-account-json }}
        TF_VAR_project: ${{ inputs.tag-project }}
        TF_VAR_owner: ${{ inputs.tag-owner }}
        # This workflow always provisions both Elastic Defend VMs; use Terraform variables for selective applies outside CI.
        TF_VAR_deploy_aws_elastic_defend_linux: true
        TF_VAR_deploy_aws_elastic_defend_windows: true
      shell: bash
      working-directory: "deploy/test-environments/cdr"
      run: |
        # Restrict WinRM (5985) ingress to the runner egress IP.
        # The ec2-windows module rejects empty / 0.0.0.0/0 to avoid exposing WinRM to the internet by default.
        RUNNER_EGRESS_IP="$(curl -fsS https://checkip.amazonaws.com | tr -d '\n')"
        if [[ -z "$RUNNER_EGRESS_IP" ]]; then
          echo "Failed to determine runner egress IP for WinRM allowlist"
          exit 1
        fi
        export TF_VAR_windows_elastic_defend_winrm_ingress_cidr="${RUNNER_EGRESS_IP}/32"

        terraform init
        terraform validate
        terraform apply -auto-approve

    - name: Get CDR Outputs
      id: generate-data
      if: success()
      shell: bash
      working-directory: "deploy/test-environments/cdr"
      run: ./export_terraform_outputs.sh

    - name: Wait for Kibana and Fleet to be ready
      id: wait-for-kibana
      if: success()
      shell: bash
      env:
        ES_USER: ${{ inputs.es-user }}
        ES_PASSWORD: ${{ inputs.es-password }}
        KIBANA_URL: ${{ inputs.kibana-url }}
        SERVERLESS_MODE: ${{ inputs.serverless-mode }}
      run: |
        set -euo pipefail

        echo "Waiting for Kibana to report 'available' at ${KIBANA_URL}/api/status"
        KIBANA_OK=""
        for i in $(seq 1 30); do
          HTTP_CODE=$(curl -s -u "${ES_USER}:${ES_PASSWORD}" \
            -o /tmp/kibana_status.json \
            -w "%{http_code}" \
            "${KIBANA_URL}/api/status")
          if [[ "$HTTP_CODE" == "200" ]]; then
            LEVEL=$(jq -r '.status.overall.level // empty' /tmp/kibana_status.json 2>/dev/null || true)
            STATE=$(jq -r '.status.overall.state // empty' /tmp/kibana_status.json 2>/dev/null || true)
            if [[ "$LEVEL" == "available" || "$STATE" == "green" ]]; then
              echo "Kibana is ready (level=${LEVEL:-n/a}, state=${STATE:-n/a})"
              KIBANA_OK=1
              break
            fi
            echo "attempt $i/30: Kibana not ready yet (level=${LEVEL:-n/a}, state=${STATE:-n/a}), sleeping 10s"
          else
            echo "attempt $i/30: Kibana returned HTTP ${HTTP_CODE}, sleeping 10s"
          fi
          sleep 10
        done
        if [ -z "$KIBANA_OK" ]; then
          echo "Timed out waiting for Kibana to become ready after 300s"
          exit 1
        fi

        if [[ "${SERVERLESS_MODE}" == "true" ]]; then
          echo "Serverless mode: skipping Fleet status check (Fleet is managed by Elastic Cloud)"
          exit 0
        fi

        echo "Triggering Fleet setup at ${KIBANA_URL}/api/fleet/setup"
        FLEET_OK=""
        for i in $(seq 1 30); do
          HTTP_CODE=$(curl -s \
            -X POST \
            -u "${ES_USER}:${ES_PASSWORD}" \
            -H "Content-Type: application/json" \
            -H "kbn-xsrf: true" \
            -o /tmp/fleet_status.json \
            -w "%{http_code}" \
            "${KIBANA_URL}/api/fleet/setup")
          if [[ "$HTTP_CODE" == "200" ]]; then
            IS_INITIALIZED=$(jq -r '.isInitialized // false' /tmp/fleet_status.json 2>/dev/null || true)
            if [[ "$IS_INITIALIZED" == "true" ]]; then
              echo "Fleet setup complete (isInitialized=true)"
              FLEET_OK=1
              break
            fi
            BODY=$(cat /tmp/fleet_status.json 2>/dev/null | head -c 300 || true)
            echo "attempt $i/30: Fleet setup not complete yet, body: ${BODY}, sleeping 10s"
          else
            BODY=$(cat /tmp/fleet_status.json 2>/dev/null | head -c 300 || true)
            echo "attempt $i/30: Fleet setup returned HTTP ${HTTP_CODE}, body: ${BODY}, sleeping 10s"
          fi
          sleep 10
        done
        if [ -z "$FLEET_OK" ]; then
          echo "Timed out waiting for Fleet setup to complete after 300s"
          exit 1
        fi

        echo "Waiting for Fleet Server to be stable at ${KIBANA_URL}/api/fleet/epm/packages"
        CONSECUTIVE_OK=0
        REQUIRED_OK=5
        for i in $(seq 1 60); do
          HTTP_CODE=$(curl -s \
            -u "${ES_USER}:${ES_PASSWORD}" \
            -H "Content-Type: application/json" \
            -H "kbn-xsrf: true" \
            -o /tmp/fleet_epm.json \
            -w "%{http_code}" \
            "${KIBANA_URL}/api/fleet/epm/packages")
          if [[ "$HTTP_CODE" == "200" ]]; then
            CONSECUTIVE_OK=$((CONSECUTIVE_OK + 1))
            echo "attempt $i/60: Fleet Server OK (${CONSECUTIVE_OK}/${REQUIRED_OK} consecutive)"
            if [[ "$CONSECUTIVE_OK" -ge "$REQUIRED_OK" ]]; then
              echo "Fleet Server is stable"
              break
            fi
          else
            CONSECUTIVE_OK=0
            BODY=$(cat /tmp/fleet_epm.json 2>/dev/null | head -c 300 || true)
            echo "attempt $i/60: Fleet Server returned HTTP ${HTTP_CODE}, body: ${BODY}, resetting consecutive counter, sleeping 10s"
          fi
          sleep 10
        done
        if [[ "$CONSECUTIVE_OK" -lt "$REQUIRED_OK" ]]; then
          echo "Timed out waiting for Fleet Server to stabilise"
          exit 1
        fi

    - name: Install AWS Cloudtrail integration
      id: cloudtrail-integration
      if: ${{ !cancelled() && steps.deploy-cdr-infra.outcome == 'success' && steps.wait-for-kibana.outcome == 'success' }}
      working-directory: tests/integrations_setup
      shell: bash
      env:
        CLOUDTRAIL_S3: ${{ inputs.aws-cloudtrail-s3-bucket }}
        AWS_REGION: ${{ inputs.aws-region }}
        ES_USER: ${{ inputs.es-user }}
        ES_PASSWORD: ${{ inputs.es-password }}
        KIBANA_URL: ${{ inputs.kibana-url }}
      run: |
        poetry run python ./install_cloudtrail_integration.py

    - name: Deploy AWS Cloudtrail agent
      if: ${{ !cancelled() && steps.deploy-cdr-infra.outcome  == 'success' && steps.cloudtrail-integration.outcome == 'success' }}
      working-directory: deploy/test-environments/cdr
      shell: bash
      env:
        CLOUDTRAIL_KEY: ${{ steps.generate-data.outputs.aws-ec2-cloudtrail-key }}
        CLOUDTRAIL_PUBLIC_IP: ${{ steps.generate-data.outputs.aws-ec2-cloudtrail-public-ip }}
      run: |
        scriptname="cloudtrail-linux.sh"
        src="../../../tests/integrations_setup/$scriptname"
        cmd="chmod +x $scriptname && ./$scriptname"
        ../remote_setup.sh -k "$CLOUDTRAIL_KEY" -s "$src" -h "$CLOUDTRAIL_PUBLIC_IP" -d "~/$scriptname" -c "$cmd"

    - name: Install Azure Activity Logs integration
      id: az-activity-logs-integration
      if: ${{ !cancelled() && steps.deploy-cdr-infra.outcome == 'success' && steps.wait-for-kibana.outcome == 'success' }}
      working-directory: tests/integrations_setup
      shell: bash
      env:
        EVENTHUB: "activity-logs"
        CONNECTION_STRING: ${{ inputs.azure-eventhub-connection-string }}
        STORAGE_ACCOUNT: "testenvsactivitylogs"
        STORAGE_ACCOUNT_KEY: ${{ inputs.azure-storage-account-key }}
        ES_USER: ${{ inputs.es-user }}
        ES_PASSWORD: ${{ inputs.es-password }}
        KIBANA_URL: ${{ inputs.kibana-url }}
      run: |
        poetry run python ./install_az_activity_logs_integration.py

    - name: Deploy Azure Activity Logs agent
      if: ${{ !cancelled() && steps.deploy-cdr-infra.outcome  == 'success' && steps.az-activity-logs-integration.outcome == 'success' }}
      working-directory: deploy/test-environments/cdr
      shell: bash
      env:
        ACTIVITY_LOGS_KEY: ${{ steps.generate-data.outputs.az-vm-activity-logs-key }}
        ACTIVITY_LOGS_PUBLIC_IP: ${{ steps.generate-data.outputs.az-vm-activity-logs-public-ip }}
      run: |
        scriptname="az_activity_logs.sh"
        src="../../../tests/integrations_setup/$scriptname"
        cmd="chmod +x $scriptname && ./$scriptname"
        ../remote_setup.sh -k "$ACTIVITY_LOGS_KEY" -s "$src" -h "$ACTIVITY_LOGS_PUBLIC_IP" -d "~/$scriptname" -c "$cmd"

    - name: Install GCP Audit Logs integration
      id: gcp-audit-logs-integration
      if: ${{ !cancelled() && steps.deploy-cdr-infra.outcome == 'success' && steps.wait-for-kibana.outcome == 'success' }}
      working-directory: tests/integrations_setup
      shell: bash
      env:
        GCP_TOPIC_NAME: "test-envs-topic"
        GCP_SUBSCRIPTION_NAME: "test-envs-topic-sub-id"
        ES_USER: ${{ inputs.es-user }}
        ES_PASSWORD: ${{ inputs.es-password }}
        KIBANA_URL: ${{ inputs.kibana-url }}
      run: |
        poetry run python ./install_gcp_audit_logs_integration.py

    - name: Deploy GCP Audit Logs agent
      if: ${{ !cancelled() && steps.deploy-cdr-infra.outcome  == 'success' && steps.gcp-audit-logs-integration.outcome == 'success' }}
      working-directory: deploy/test-environments/cdr
      shell: bash
      env:
        AUDIT_LOGS_KEY: ${{ steps.generate-data.outputs.gcp-audit-logs-key }}
        AUDIT_LOGS_PUBLIC_IP: ${{ steps.generate-data.outputs.gcp-audit-logs-public-ip }}
      run: |
        scriptname="gcp_audit_logs.sh"
        src="../../../tests/integrations_setup/$scriptname"
        cmd="chmod +x $scriptname && ./$scriptname"
        ../remote_setup.sh -k "$AUDIT_LOGS_KEY" -s "$src" -h "$AUDIT_LOGS_PUBLIC_IP" -d "~/$scriptname" -c "$cmd"

    - name: Install WIZ integration
      id: wiz-integration
      if: ${{ !cancelled() && steps.deploy-cdr-infra.outcome == 'success' && steps.wait-for-kibana.outcome == 'success' }}
      working-directory: tests/integrations_setup
      shell: bash
      env:
        WIZ_CLIENT_ID: ${{ inputs.wiz-client-id }}
        WIZ_CLIENT_SECRET: ${{ inputs.wiz-client-secret }}
        WIZ_URL: ${{ inputs.wiz-endpoint-url }}
        WIZ_TOKEN_URL: ${{ inputs.wiz-token-url }}
        ES_USER: ${{ inputs.es-user }}
        ES_PASSWORD: ${{ inputs.es-password }}
        KIBANA_URL: ${{ inputs.kibana-url }}
      run: |
        poetry run python ./install_wiz_integration.py

    - name: Install Okta integration (Fleet, Wiz agent policy)
      id: okta-integration
      if: ${{ !cancelled() && steps.deploy-cdr-infra.outcome == 'success' && steps.wiz-integration.outcome == 'success' }}
      working-directory: tests/integrations_setup
      shell: bash
      env:
        OKTA_LOGS_URL: ${{ inputs.okta-logs-url }}
        OKTA_API_KEY: ${{ inputs.okta-api-key }}
        ES_USER: ${{ inputs.es-user }}
        ES_PASSWORD: ${{ inputs.es-password }}
        KIBANA_URL: ${{ inputs.kibana-url }}
        STACK_VERSION: ${{ inputs.elk-stack-version }}
        AGENT_VERSION: ${{ inputs.elk-stack-version }}
      run: |
        poetry run python ./install_okta_integration.py

    - name: Install Okta Entity Analytics (Fleet, Wiz agent policy)
      id: okta-entityanalytics-integration
      if: ${{ !cancelled() && steps.deploy-cdr-infra.outcome == 'success' && steps.wiz-integration.outcome == 'success' }}
      working-directory: tests/integrations_setup
      shell: bash
      env:
        OKTA_ENTITY_ANALYTICS_DOMAIN: ${{ inputs.okta-entity-analytics-domain }}
        OKTA_API_KEY: ${{ inputs.okta-api-key }}
        ES_USER: ${{ inputs.es-user }}
        ES_PASSWORD: ${{ inputs.es-password }}
        KIBANA_URL: ${{ inputs.kibana-url }}
        STACK_VERSION: ${{ inputs.elk-stack-version }}
        AGENT_VERSION: ${{ inputs.elk-stack-version }}
      run: |
        poetry run python ./install_entityanalytics_okta_integration.py

    - name: Deploy WIZ agent
      if: ${{ !cancelled() && steps.deploy-cdr-infra.outcome == 'success' && steps.wiz-integration.outcome == 'success' }}
      working-directory: deploy/test-environments/cdr
      shell: bash
      env:
        WIZ_KEY: ${{ steps.generate-data.outputs.ec2-wiz-key }}
        WIZ_PUBLIC_IP: ${{ steps.generate-data.outputs.ec2-wiz-public-ip }}
      run: |
        scriptname="wiz.sh"
        src="../../../tests/integrations_setup/$scriptname"
        cmd="chmod +x $scriptname && ./$scriptname"
        ../remote_setup.sh -k "$WIZ_KEY" -s "$src" -h "$WIZ_PUBLIC_IP" -d "~/$scriptname" -c "$cmd"

    - name: Install Elastic Defend (Fleet)
      id: elastic-defend-fleet
      if: ${{ !cancelled() && steps.deploy-cdr-infra.outcome == 'success' && steps.wait-for-kibana.outcome == 'success' }}
      working-directory: tests/integrations_setup
      shell: bash
      env:
        ES_USER: ${{ inputs.es-user }}
        ES_PASSWORD: ${{ inputs.es-password }}
        KIBANA_URL: ${{ inputs.kibana-url }}
        STACK_VERSION: ${{ inputs.elk-stack-version }}
        AGENT_VERSION: ${{ inputs.elk-stack-version }}
        ELASTIC_DEFEND_ENROLL_LINUX: true
        ELASTIC_DEFEND_ENROLL_WINDOWS: true
        ELASTIC_DEFEND_LINUX_PUBLIC_IP: ${{ steps.generate-data.outputs.elastic-defend-linux-public-ip }}
        ELASTIC_DEFEND_WINDOWS_PUBLIC_IP: ${{ steps.generate-data.outputs.elastic-defend-windows-public-ip }}
        ELASTIC_DEFEND_WINDOWS_INSTANCE_ID: ${{ steps.generate-data.outputs.elastic-defend-windows-instance-id }}
      run: |
        poetry run python ./install_elastic_defend_integration.py

    - name: Deploy Elastic Defend agent (Linux)
      if: ${{ !cancelled() && steps.deploy-cdr-infra.outcome == 'success' && steps.elastic-defend-fleet.outcome == 'success' && steps.generate-data.outputs.elastic-defend-linux-public-ip != '' }}
      working-directory: deploy/test-environments/cdr
      shell: bash
      env:
        DEFEND_KEY: ${{ steps.generate-data.outputs.elastic-defend-linux-key }}
        DEFEND_PUBLIC_IP: ${{ steps.generate-data.outputs.elastic-defend-linux-public-ip }}
      run: |
        scriptname="elastic-defend-linux.sh"
        src="../../../tests/integrations_setup/$scriptname"
        cmd="chmod +x $scriptname && ./$scriptname"
        ../remote_setup.sh -k "$DEFEND_KEY" -s "$src" -h "$DEFEND_PUBLIC_IP" -d "~/$scriptname" -c "$cmd"

    # PEM path in Terraform output is relative to deploy/test-environments/cdr (same as terraform apply).
    - name: Prepare Windows Defend credentials (WinRM)
      id: windows-defend-credentials
      if: ${{ !cancelled() && steps.deploy-cdr-infra.outcome == 'success' && steps.elastic-defend-fleet.outcome == 'success' && steps.generate-data.outputs.elastic-defend-windows-public-ip != '' }}
      working-directory: deploy/test-environments/cdr
      shell: bash
      env:
        AWS_DEFAULT_REGION: ${{ inputs.aws-region }}
        DEFEND_WIN_KEY: ${{ steps.generate-data.outputs.elastic-defend-windows-key }}
        DEFEND_WIN_INSTANCE: ${{ steps.generate-data.outputs.elastic-defend-windows-instance-id }}
        DEFEND_WIN_IP: ${{ steps.generate-data.outputs.elastic-defend-windows-public-ip }}
        WINDOWS_DEFEND_CREDENTIALS_FILE: "${{ github.workspace }}/tests/integrations_setup/.windows-defend-connection.json"
      run: |
        set -euo pipefail
        echo "Waiting on ${DEFEND_WIN_IP}:5985 ..."
        PORT_OK=""
        for i in $(seq 1 12); do
          if timeout 5 bash -c "echo > /dev/tcp/${DEFEND_WIN_IP}/5985" 2>/dev/null; then
            PORT_OK=1
            echo "Port is open"
            break
          fi
          echo "attempt $i/12: sleeping 5s"
          sleep 5
        done
        if [ -z "$PORT_OK" ]; then
          echo "Timed out waiting for TCP 5985 on ${DEFEND_WIN_IP}"
          exit 1
        fi
        if [ ! -f "$DEFEND_WIN_KEY" ]; then
          echo "Windows PEM not found at DEFEND_WIN_KEY=$DEFEND_WIN_KEY (cwd=$(pwd); resolve paths from deploy/test-environments/cdr)"
          exit 1
        fi
        PASSWORD=""
        for j in $(seq 1 30); do
          PASSWORD="$(aws ec2 get-password-data --region "$AWS_DEFAULT_REGION" --instance-id "$DEFEND_WIN_INSTANCE" --priv-launch-key "$DEFEND_WIN_KEY" --query PasswordData --output text || true)"
          if [ -n "$PASSWORD" ] && [ "$PASSWORD" != "None" ]; then
            break
          fi
          echo "Waiting for password ($j/30)..."
          sleep 10
        done
        if [ -z "$PASSWORD" ] || [ "$PASSWORD" = "None" ]; then
          echo "Failed to retrieve password"
          exit 1
        fi
        echo "::add-mask::$PASSWORD"
        export DEFEND_ADMIN_PASSWORD="$PASSWORD"
        python3 <<'PY'
        import json
        import os
        import pathlib

        pathlib.Path(os.environ["WINDOWS_DEFEND_CREDENTIALS_FILE"]).write_text(
            json.dumps(
                {
                    "instance_id": os.environ["DEFEND_WIN_INSTANCE"],
                    "public_ip": os.environ["DEFEND_WIN_IP"],
                    "winrm_port": 5985,
                    "winrm_use_ssl": False,
                    "username": "Administrator",
                    "password": os.environ["DEFEND_ADMIN_PASSWORD"],
                },
                indent=2,
            ),
            encoding="utf-8",
        )
        PY

    - name: Enroll Elastic Defend agent (Windows WinRM)
      if: ${{ !cancelled() && steps.windows-defend-credentials.outcome == 'success' }}
      working-directory: tests/integrations_setup
      shell: bash
      env:
        ELASTIC_DEFEND_WINDOWS_PS1: "${{ github.workspace }}/tests/integrations_setup/elastic-defend-windows.ps1"
        WINDOWS_DEFEND_CREDENTIALS_FILE: "${{ github.workspace }}/tests/integrations_setup/.windows-defend-connection.json"
      run: |
        set -euo pipefail
        poetry run python ./enroll_elastic_defend_winrm.py

    - name: Check Asset Inventory supported version
      id: asset-inventory-version-check
      if: ${{ !cancelled() && steps.deploy-cdr-infra.outcome == 'success' && steps.wait-for-kibana.outcome == 'success' }}
      shell: bash
      env:
        STACK_VERSION: ${{ inputs.elk-stack-version }}
      run: |
        MIN_VERSION="8.16.0"
        if [[ "$(echo -e "$MIN_VERSION\n$STACK_VERSION" | sort -V | head -n 1)" == "$MIN_VERSION" ]]; then
          echo "Stack version meets the requirement: $STACK_VERSION >= $MIN_VERSION."
          echo "asset_inventory_supported=true" >> $GITHUB_OUTPUT
        else
          echo "Stack version is below the requirement: $STACK_VERSION < $MIN_VERSION."
          echo "asset_inventory_supported=false" >> $GITHUB_OUTPUT
        fi

    - name: Enable Entity Store (v1 or v2)
      if: ${{ !cancelled() && steps.asset-inventory-version-check.outputs.asset_inventory_supported == 'true' }}
      working-directory: tests/integrations_setup
      shell: bash
      env:
        ES_USER: ${{ inputs.es-user }}
        ES_PASSWORD: ${{ inputs.es-password }}
        KIBANA_URL: ${{ inputs.kibana-url }}
        STACK_VERSION: ${{ inputs.elk-stack-version }}
        ENABLE_ENTITY_STORE_V2: ${{ inputs.enable-entity-store-v2 }}
      run: |
        set -euo pipefail
        if [[ "${ENABLE_ENTITY_STORE_V2}" == "true" ]]; then
          # Entity Store v2 prerequisites + install + maintainers + v2 status poll
          poetry run python ./enable_entity_store_v2.py
        else
          # Entity Store v1 prerequisites + enable + v1 status poll (includes data view creation)
          poetry run python ./enable_entity_store.py
        fi

    - name: Install Azure Asset Inventory integration
      id: azure-asset-inventory-integration
      working-directory: tests/integrations_setup
      if: ${{ !cancelled() && steps.asset-inventory-version-check.outputs.asset_inventory_supported == 'true'}}
      shell: bash
      env:
        ES_USER: ${{ inputs.es-user }}
        ES_PASSWORD: ${{ inputs.es-password }}
        KIBANA_URL: ${{ inputs.kibana-url }}
        STACK_VERSION: ${{ inputs.elk-stack-version }}
      run: |
        poetry run python ./install_azure_asset_inventory_integration.py

    - name: Deploy Azure Asset Inventory agent
      id: azure-asset-inventory-agent
      working-directory: deploy/azure
      if: ${{ !cancelled() && steps.asset-inventory-version-check.outputs.asset_inventory_supported == 'true' && steps.azure-asset-inventory-integration.outcome == 'success' }}
      shell: bash
      env:
        AZURE_TAGS: ${{ inputs.azure-tags }}
        DEPLOYMENT_NAME: "${{ inputs.deployment-name }}-inventory"
      run: DEPLOYMENT_NAME="$DEPLOYMENT_NAME-$(openssl rand -hex 3)" ./install_agent_az_cli.sh

    - name: Install AWS Asset Inventory integration
      id: aws-asset-inventory
      if: ${{ !cancelled() && steps.asset-inventory-version-check.outputs.asset_inventory_supported == 'true' }}
      working-directory: tests/integrations_setup
      shell: bash
      env:
        ES_USER: ${{ inputs.es-user }}
        ES_PASSWORD: ${{ inputs.es-password }}
        KIBANA_URL: ${{ inputs.kibana-url }}
        STACK_VERSION: ${{ inputs.elk-stack-version }}
      run: |
        poetry run python ./install_aws_asset_inventory_integration.py

    - name: Deploy AWS Asset Inventory agent
      if: ${{ !cancelled() && steps.asset-inventory-version-check.outputs.asset_inventory_supported == 'true' }}
      working-directory: deploy/test-environments/cdr
      shell: bash
      env:
        EC2_ASSET_INV_KEY: ${{ steps.generate-data.outputs.ec2-asset-inv-key }}
        ASSET_INV_PUBLIC_IP: ${{ steps.generate-data.outputs.asset-inv-public-ip }}
      run: |
        scriptname="aws-asset-inventory-linux.sh"
        src="../../../tests/integrations_setup/$scriptname"
        cmd="chmod +x $scriptname && ./$scriptname"
        ../remote_setup.sh -k "$EC2_ASSET_INV_KEY" -s "$src" -h "$ASSET_INV_PUBLIC_IP" -d "~/$scriptname" -c "$cmd"

    - name: Create GCP Service Account
      id: create-service-account-cdr
      if: ${{ !cancelled() && steps.asset-inventory-version-check.outputs.asset_inventory_supported == 'true' }}
      shell: bash
      working-directory: deploy/deployment-manager
      env:
        SERVICE_ACCOUNT_NAME: "${{ inputs.deployment-name }}-sa"
        DEPLOYMENT_NAME: "${{ inputs.deployment-name }}-acc"
      run: |
          # Deploys a GCP Service Account
          ./deploy_service_account.sh
          mv KEY_FILE.json "../../tests/integrations_setup"

    - name: Install GCP Asset Inventory integration
      id: gcp-asset-inventory
      if: ${{ !cancelled() && steps.asset-inventory-version-check.outputs.asset_inventory_supported == 'true' }}
      shell: bash
      working-directory: tests/integrations_setup
      env:
        ES_USER: ${{ inputs.es-user }}
        ES_PASSWORD: ${{ inputs.es-password }}
        KIBANA_URL: ${{ inputs.kibana-url }}
        STACK_VERSION: ${{ inputs.elk-stack-version }}
        AGENT_VERSION: ${{ inputs.elk-stack-version }}
        SERVICE_ACCOUNT_JSON_PATH: "KEY_FILE.json"
      run: |
        poetry run python ./install_gcp_asset_inventory_integration.py

    - name: Deploy GCP Asset Inventory agent
      id: gcp-asset-inventory-agent
      if: ${{ !cancelled() && steps.gcp-asset-inventory.outcome  == 'success' }}
      shell: bash
      working-directory: deploy/deployment-manager
      env:
        ACTOR: ${{ github.actor }}
        DEPLOYMENT_NAME: "${{ inputs.deployment-name }}"
        GCP_ZONE: "${{ inputs.gcp-zone }}"
        SERVICE_ACCOUNT_NAME: "${{ inputs.deployment-name }}-sa"
      run: |
        # GCP labeling rules:
        # Only hyphens (-), underscores (_), lowercase characters, and numbers are allowed. International characters are allowed.
        # Convert github.actor to lowercase, replace disallowed characters
        gcp_label=$(echo "$ACTOR" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9_-]/_/g')
        gcp_default_tag="division=engineering,org=security,team=contextual-security,project=test-environments,owner=$gcp_label"
        . ./set_env.sh && ./deploy.sh && gcloud compute instances update "${DEPLOYMENT_NAME}" --update-labels "${gcp_default_tag}" --zone="${GCP_ZONE}"

    - name: Upload CDR state
      id: upload-state-cdr
      if: always()
      working-directory: deploy/test-environments
      shell: bash
      env:
        S3_BUCKET: ${{ inputs.env-s3-bucket }}
        CLOUDTRAIL_KEY: ${{ steps.generate-data.outputs.aws-ec2-cloudtrail-key }}
        ACTIVITY_LOGS_KEY: ${{ steps.generate-data.outputs.az-vm-activity-logs-key }}
        AUDIT_LOGS_KEY: ${{ steps.generate-data.outputs.gcp-audit-logs-key }}
        EC2_ASSET_INV_KEY: ${{ steps.generate-data.outputs.ec2-asset-inv-key }}
        EC2_WIZ_KEY: ${{ steps.generate-data.outputs.ec2-wiz-key }}
        INTEGRATIONS_SETUP_DIR: "../../../tests/integrations_setup"
        ELASTIC_DEFEND_LINUX_KEY: ${{ steps.generate-data.outputs.elastic-defend-linux-key }}
        ELASTIC_DEFEND_WINDOWS_KEY: ${{ steps.generate-data.outputs.elastic-defend-windows-key }}
        WINDOWS_DEFEND_CREDENTIALS_FILE: "${{ github.workspace }}/tests/integrations_setup/.windows-defend-connection.json"
      run: |
        ./manage_infrastructure.sh "cdr" "upload-state"
