name: Auto-approve version bump PRs

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: write
  metadata: read

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    if: |
      github.actor == 'cloudsecmachine' &&
      (
        startsWith(github.event.pull_request.title, 'Bump cloudbeat version') ||
        startsWith(github.event.pull_request.title, 'Release cloudbeat version')
      ) &&
      contains(github.event.pull_request.labels.*.name, 'backport-skip')
    steps:
      - name: Approve PR
        uses: hmarr/auto-approve-action@44888193675f29a83e04faf4002fa8c0b537b1e4 # v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
