notify:
  - slack:
      channels:
        - "#security-cloud-services-team"
    if: (build.branch == 'main' || build.branch =~ /^[0-9]+\.[0-9x]+$/) && (build.state == 'passed' || build.state == 'failed')
  - slack:
      channels:
        - "#security-cloud-services-team"
      message: |
        🚦 Pipeline waiting for approval 🚦
        Repo: `${REPO}`

        Ready to fetch DRA artifacts - please unblock when ready.
        New version: `${NEW_VERSION}`
        Branch: `${BRANCH}`
        Workflow: `${WORKFLOW}`
        ${BUILDKITE_BUILD_URL}
    if: build.state == "blocked"

steps:
  - label: ":mag: Verify: gh CLI + ephemeral token"
    key: verify-gh-token
    agents:
      image: docker.elastic.co/release-eng/wolfi-build-essential-release-eng:latest
      cpu: 250m
      memory: 512Mi
      ephemeralStorage: 1Gi
    plugins:
      - elastic/vault-github-token#v0.2.0: ~
    command:
      - .buildkite/scripts/verify-gh-token.sh
    timeout_in_minutes: 10

  # - label: "Validate WORKFLOW input"
