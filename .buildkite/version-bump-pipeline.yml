  #   agents:
  #     image: docker.elastic.co/release-eng/wolfi-build-essential-release-eng:latest
  #     cpu: 250m
  #     memory: 512Mi

  # - wait:

  # - label: "Bump version minor"
  #   key: bump-version-minor
  #   if: build.env("WORKFLOW") == "minor"
  #   agents:
  #     image: docker.elastic.co/release-eng/wolfi-build-essential-release-eng:latest
  #     cpu: 250m
  #     memory: 512Mi
  #   plugins:
  #     - elastic/vault-github-token#v0.1.0: ~
  #     - elastic/gh-cli#v0.1.1:
  #         workflow-file: "bump-version.yml"
  #         workflow-ref: "main"
  #         workflow-inputs: |
  #           target_branch=main
